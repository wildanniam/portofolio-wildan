constraints:
  - >-
    A single paid request crosses an HTTP client, payment verifier, persistent replay
    store, Soroban ledger, secret-protected upstream, and provider dashboard.
  - >-
    Payment success and upstream delivery are different states; a paid request may
    fail before delivery and must not be charged again on a safe retry.
  - >-
    The current product is testnet scoped. Mainnet operations, automatic refunds,
    customer scale, and independent security certification remain future work.
decisions:
  - title: Make activation prove upstream protection
    rationale: >-
      A publicly reachable upstream would make the paid proxy cosmetic. PayGate
      probes with an invalid secret and requires rejection, then probes with the
      generated secret and requires success before activating an endpoint.
    consequence: >-
      Activation proves that PayGate is the intended access path rather than merely
      recording a provider's configuration claim.
    evidenceIds:
      - paygate-product-flow
  - title: Bind payment identity across every boundary
    rationale: >-
      One PayGate payment ID is carried through the MPP external ID, database
      constraints, replay store, transaction record, and idempotent contract credit.
    consequence: >-
      A receipt can be traced and duplicate credentials or transaction hashes can be
      rejected, while reconciliation remains an explicit system boundary.
    evidenceIds:
      - paygate-system-map
      - paygate-testnet-ledger
  - title: Keep developer custody at withdrawal
    rationale: >-
      PayGate prepares the intended transaction, but Freighter holds the signing
      decision and the server checks the source and expected transaction hash.
    consequence: >-
      The backend does not receive the developer's private key, at the cost of an
      additional explicit wallet step.
    evidenceIds:
      - paygate-system-map
      - paygate-testnet-ledger
systemFlow:
  - A provider signs a Freighter wallet-auth challenge and registers a priced GET or JSON endpoint.
  - PayGate creates a proxy URL and encrypted upstream secret in a pending setup state.
  - Invalid-secret rejection and valid-secret success activate the endpoint.
  - An unpaid machine request receives HTTP 402 with request and payment identifiers.
  - The client pays testnet USDC through Stellar MPP and retries with the credential.
  - PayGate validates the bound payment, amount, recipient, transaction, and replay state.
  - The Soroban escrow records an idempotent credit and PayGate forwards the secret-protected request.
  - The response includes a receipt; the dashboard exposes request, payment, credit, split, and withdrawal evidence.
