oneLiner: Turning ordinary APIs into machine-paid endpoints on Stellar testnet.
problem: >-
  API billing usually assumes a human who creates an account, chooses a plan, and
  enters a card. AI agents need a machine-readable price challenge, a way to pay
  for one request, a safe retry with proof, and a JSON response. API owners would
  otherwise have to assemble verification, replay protection, upstream access,
  accounting, settlement, and withdrawal themselves.
intendedUsers:
  - Indie API builders and startup teams operating useful GET and JSON endpoints.
  - Backend developers who want per-call monetization without building a payment gateway from scratch.
  - AI agents and machine clients that can answer an HTTP 402 challenge with Stellar payment credentials.
teamContext:
