oneLiner: A recovery cockpit that separates safe test healing from real product bugs.
context: >-
  SpecHeal was built during the Refactory Hackathon around a hard engineering
  productivity problem: recovering Playwright failures without converting genuine
  regressions into false-green test runs.
outcome: >-
  The team produced an end-to-end artifact spanning failure evidence, OpenSpec
  behavior, structured AI reasoning, controlled candidate patches, browser reruns,
  audit history, and product-bug handoff, and placed second at the Refactory Hackathon.
