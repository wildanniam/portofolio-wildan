constraints:
  - >-
    The agent had to help users understand and prepare an action without holding a
    private key or silently moving the wallet-signing boundary into the model.
  - >-
    Explorer, market, payment, and model services had different latency, rate
    limits, and reliability inside a short hackathon build window.
  - >-
    Some sprint demo branches used simulated fallbacks; the case study must keep
    live, recorded, staging, and simulated evidence visibly distinct.
decisions:
  - title: Orchestrate an existing wallet instead of creating custody
    rationale: >-
      Nova could interpret intent and prepare a transaction while the connected EVM
      wallet remained the only place where the user approved a signature.
    consequence: >-
      The prototype demonstrates agent-assisted execution without claiming that the
      AI autonomously controls funds.
    evidenceIds:
      - nova-agent-flow
      - nova-system-map
  - title: Render purpose-built evidence cards
    rationale: >-
      Balances, counterparties, trade-cost estimates, payments, and transaction
      proposals need different information hierarchy; a text-only answer would
      hide the details a user should inspect.
    consequence: >-
      Tool results become reviewable UI, but each card also increases the surface
      that must keep provenance and loading states honest.
    evidenceIds:
      - nova-agent-flow
  - title: Separate the prediction service behind an HTTP boundary
    rationale: >-
      The trade-cost model could be deployed and checked independently from the
      Next.js application.
    consequence: >-
      The companion service remained live after the sprint, while its estimate must
      still be labeled as model output rather than a guaranteed execution price.
    evidenceIds:
      - nova-source-proof
systemFlow:
  - A user opens the chat route and connects an EVM wallet.
  - CopilotKit maps the prompt to a registered balance, analysis, prediction, payment, or transaction action.
  - Read actions call Next.js routes that select chain clients and aggregate explorer or RPC data.
  - Nova renders a dedicated evidence card, form, or transaction review state.
  - A send action validates the proposal and requests a network switch when needed.
  - Only a separate user action opens the connected wallet for final signing.
