oneLiner: Turning wallet intent into inspectable actions without taking over the signature.
problem: >-
  Crypto workflows spread one user intention across wallet menus, raw addresses,
  explorers, market tools, and payment interfaces. Nova explored whether a
  conversational layer could translate that intention into inspectable reads and
  prepared actions while leaving final authorization with the user's wallet.
intendedUsers:
  - EVM wallet users who want natural-language balance, activity, and transaction preparation.
  - On-chain explorers and traders combining portfolio, counterparty, whale, and trade-cost context.
  - Freelancers and creators experimenting with fiat-to-crypto payment links.
