    slot: team-outcome
    acquisitionNotes: >-
      Prepare the owner-supplied WCHL team photograph and official result as one
      credited outcome frame after identity, date, place, rights, and consent review.
    redactionNotes: >-
      Remove unnecessary badge, contact, or venue identifiers before publishing a
      derivative; preserve the untouched master outside the repository.
limitations:
  - The case study must call the implementation a hybrid multi-chain analysis flow, not claim that every step is fully on-chain.
  - Bitcoin, Ethereum, and Solana wallet execution is testnet or devnet scoped.
  - Model metrics are experimental repository evidence, not an independent security guarantee.
  - The product warns and assists; it does not guarantee that an address or transaction is safe.
next:
