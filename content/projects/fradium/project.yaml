constraints:
  - >-
    The risk verdict had to combine model output and community evidence without
    pretending either signal was absolute truth.
  - >-
    The team had to join a web product, browser extension, multiple canisters,
    chain-specific data preparation, and wallet signing inside a hackathon sprint.
  - >-
    Bitcoin, Ethereum, and Solana wallet execution remained on test networks;
    production-security and adoption claims are outside the proven scope.
decisions:
  - title: Put the risk signal inside the transaction decision
    rationale: >-
      A separate analyzer is easy to ignore. Fradium repeats the same evidence at
      the point where a user is about to confirm or cancel a send.
    consequence: >-
      The product makes risk visible without taking the final decision away from
      the user.
    evidenceIds:
      - fradium-product-verdict
  - title: Compose AI and community evidence conservatively
    rationale: >-
      A single opaque score would hide disagreement. An unsafe model result stops
      the path, while an unsafe community result can override an AI-safe result.
    consequence: >-
      The verdict is explainable as a decision rule, although the model and
      community inputs still require careful evaluation and moderation.
    evidenceIds:
      - fradium-system-map
  - title: Keep model and inference code in one deployable unit
    rationale: >-
      Embedding ONNX artifacts in the Rust AI canister keeps inference code and its
      model version together instead of fetching a mutable model at runtime.
    consequence: >-
      Deployments are easier to inspect, while updates require rebuilding and
      redeploying the canister.
    evidenceIds:
      - fradium-system-map
      - fradium-verification-ledger
systemFlow:
  - A user signs in with Internet Identity and enters an address or starts a send flow.
  - The client detects Bitcoin, Ethereum, Solana, or ICP and prepares chain-specific features.
  - The Rust AI canister runs its embedded ONNX model and returns a risk result.
  - A safe AI result is cross-checked against Motoko community-report data.
  - Fradium renders the verdict, confidence, analysis source, and history.
  - The user cancels or explicitly confirms the test-network transaction.
