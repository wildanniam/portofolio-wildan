problem: >-
  Crypto users often reach a send confirmation with little context about the
  destination address. Wallet balances, explorer history, risk signals, and
  community reports are fragmented, so the most important judgment happens with
  incomplete evidence.
intendedUsers:
  - Retail crypto users who want a pre-transaction risk check in a wallet or browser extension.
  - Community reporters and validators who contribute evidence about suspicious addresses.
  - Wallet, dApp, and exchange developers exploring an address-analysis API.
