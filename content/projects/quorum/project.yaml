oneLiner: Making collaborative event settlement inspectable on Stellar testnet.
problem: >-
  Collaborative events often collect ticket revenue through one organizer and
  reconcile speaker, venue, community, and partner shares through spreadsheets,
  screenshots, and follow-up transfers. Access, check-in, contract accounting,
  evidence, withdrawal, and off-ramp state can easily drift across trust boundaries.
intendedUsers:
  - Web3 community organizers creating paid or free events and gated resources.
  - Attendees purchasing or claiming a wallet-bound pass and checking in.
  - Collaborators who need a visible share, balance, withdrawal proof, and optional cash-out continuation.
teamContext:
  summary: >-
    Wildan owned the product and full-stack build. ArgaAAL made substantive
    infrastructure and evidence contributions across database migration, indexing,
    proof surfaces, ledger work, live-flow evidence, and deployment fixes.
  collaboratorIds:
    - arga-aal
  ownershipBoundary: >-
    Wildan's product and full-stack ownership is presented alongside direct credit
    for ArgaAAL's infrastructure and evidence phase.
role:
  label: Full-Stack Product Builder
  scope:
    - Product specification and interaction design.
    - Next.js application, server routes, sessions, and Postgres persistence.
    - Soroban contracts, wallet transaction boundaries, and deployment tooling.
    - Evidence indexing, settlement correction, MoneyGram-compatible continuation, and QA.
  claimIds:
