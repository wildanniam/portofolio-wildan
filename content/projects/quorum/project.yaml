constraints:
  - >-
    Mutable event content and user experience lived off-chain, while authorization,
    pass ownership, balances, withdrawal, and check-in needed verifiable truth.
  - >-
    Browser intent, wallet signing, RPC finality, contract events, database state,
    indexed evidence, and off-ramp continuation had to agree without treating one
    hash as proof of a different money movement.
  - >-
    The build is Stellar testnet scoped, has no independent contract audit, and has
    not demonstrated production event usage or an end-to-end MoneyGram pickup.
decisions:
  - title: Split product data from on-chain invariants
    rationale: >-
      Postgres makes event content and product iteration practical, while the
      contracts enforce the values that control payment, access, balances,
      withdrawal, and check-in.
    consequence: >-
      The system gains a clear source-of-truth map but must reconcile indexed chain
      events and application records carefully.
    evidenceIds:
      - quorum-system-map
  - title: Make wallet intent narrow and inspectable
    rationale: >-
      Prepared and signed XDR are checked for signer, network, source, contract,
      function, and arguments before submission and persistence.
    consequence: >-
      Local or mocked proof cannot silently impersonate a live transaction, while
      users retain explicit Freighter approval.
    evidenceIds:
      - quorum-system-map
      - quorum-testnet-ledger
  - title: Separate contract withdrawal from cash-out
    rationale: >-
      An on-chain event debit and a later wallet-to-MoneyGram transfer are two money
      movements. Treating them as one created a double-accounting and proof risk.
    consequence: >-
      Cash-out now references eligible settled withdrawals, keeps the two hashes
      distinct, prevents over-allocation, and reuses failed or cancelled records for
      safe retry.
    evidenceIds:
      - quorum-settlement-correction
systemFlow:
  - An organizer signs a Freighter challenge and creates an event with capacity, access mode, resources, and a 100 percent split.
  - Publishing prepares, validates, signs, submits, and confirms a QuorumCore create-event transaction.
  - An attendee pays exact testnet USDC or claims a free pass.
  - QuorumCore enforces capacity and uniqueness, credits balances, and invokes QuorumPassNFT.
  - The non-transferable pass unlocks resources and can be checked in by an authorized organizer.
  - An indexer stores contract events and cursor state for proof, pass, event, and collaborator views.
  - A collaborator withdraws the credited contract balance to a wallet.
  - Only that settled withdrawal can continue into a separate MoneyGram-compatible SEP-24 cash-out record.
