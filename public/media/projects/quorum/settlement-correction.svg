<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title description">
  <title id="title">Quorum settlement model correction</title>
  <desc id="description">A before-and-after decision record showing Quorum's correction from one conflated withdrawal and cash-out event to two explicit movements: contract settlement to a collaborator wallet, then a separately allocated wallet-to-MoneyGram-compatible cash-out continuation with independent hashes, eligibility, and retry state.</desc>
  <defs><style>.canvas{fill:#f4f5f3}.surface{fill:#fff}.soft{fill:#e5f5f7}.warning{fill:#f6e8e5}.matte{fill:#111315}.ink{fill:#111315}.text{fill:#2b3035}.muted{fill:#596068}.light{fill:#f4f5f3}.accent{fill:#16798b}.danger{fill:#9b3d2b}.rule{stroke:#c9ced3}.rule-strong{stroke:#20252a}.rule-accent{stroke:#16798b}.sans{font-family:Geist,Arial,sans-serif}.mono{font-family:"Geist Mono","SFMono-Regular",Consolas,monospace}.hairline{stroke-width:1;vector-effect:non-scaling-stroke}.strong{stroke-width:2;vector-effect:non-scaling-stroke}</style><pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#c9ced3" opacity=".35"/></pattern></defs>
  <rect class="canvas" width="1600" height="1000"/><rect x="48" y="48" width="1504" height="904" fill="url(#grid)"/><rect x="48" y="48" width="1504" height="904" fill="none" class="rule-strong hairline"/>
  <text x="88" y="103" class="mono accent" font-size="18" font-weight="600" letter-spacing="1.4">QUORUM / DECISION CORRECTION</text><text x="88" y="178" class="sans ink" font-size="68" font-weight="600" letter-spacing="-3.2">Settlement is two movements.</text><text x="88" y="221" class="sans text" font-size="22">Implementation exposed a risky assumption; the product model was corrected before the next proof milestone.</text><text x="1512" y="103" text-anchor="end" class="mono muted" font-size="15">ISSUE 27 → PR 28</text><line x1="88" y1="260" x2="1512" y2="260" class="rule-strong hairline"/>
  <rect x="88" y="304" width="654" height="364" class="warning rule-strong strong"/><text x="116" y="350" class="mono danger" font-size="14" letter-spacing="1">BEFORE / CONFLATED</text><text x="116" y="405" class="sans ink" font-size="32" font-weight="600">One “withdrawal” state</text><text x="116" y="462" class="sans text" font-size="21">Contract settlement</text><text x="116" y="510" class="sans text" font-size="21">Wallet funds</text><text x="116" y="558" class="sans text" font-size="21">Cash-out initiation</text><text x="116" y="606" class="sans text" font-size="21">Pickup result</text><rect x="454" y="430" width="244" height="174" fill="#fff"/><text x="576" y="478" text-anchor="middle" class="mono danger" font-size="13">ONE RECORD</text><text x="576" y="522" text-anchor="middle" class="sans ink" font-size="21" font-weight="600">Ambiguous hash</text><text x="576" y="558" text-anchor="middle" class="sans ink" font-size="21" font-weight="600">Ambiguous retry</text>
  <rect x="766" y="304" width="746" height="364" class="surface rule-accent strong"/><text x="794" y="350" class="mono accent" font-size="14" letter-spacing="1">AFTER / EXPLICIT</text><text x="794" y="405" class="sans ink" font-size="32" font-weight="600">Two movements, two proofs</text><rect x="794" y="444" width="296" height="174" class="soft"/><text x="818" y="480" class="mono accent" font-size="13">01 / CONTRACT</text><text x="818" y="522" class="sans ink" font-size="21" font-weight="600">Settlement → wallet</text><text x="818" y="558" class="sans text" font-size="17">Eligible withdrawal hash</text><text x="818" y="587" class="sans text" font-size="17">Finality + allocation</text><rect x="1154" y="444" width="330" height="174" class="matte"/><text x="1178" y="480" class="mono light" font-size="13">02 / CASH-OUT</text><text x="1178" y="522" class="sans light" font-size="21" font-weight="600">Wallet → off-ramp</text><text x="1178" y="558" class="sans light" font-size="17">Separate transfer hash</text><text x="1178" y="587" class="sans light" font-size="17">Independent status + retry</text><path d="M1090 531H1154" stroke="#16798b" stroke-width="3"/>
  <rect x="88" y="706" width="1424" height="142" class="soft rule-accent strong"/><text x="116" y="750" class="mono accent" font-size="14">CORRECTED INVARIANTS</text><text x="116" y="796" class="sans ink" font-size="22" font-weight="600">Confirmed withdrawal required • no over-allocation • failed/cancelled cash-out record can retry safely</text><text x="116" y="829" class="sans text" font-size="17">Contract accounting remains complete even when the optional off-ramp continuation is unfinished.</text>
  <text x="88" y="910" class="sans muted" font-size="15">Decision evidence: repository issue and pull request, migration, allocation guard, and retry semantics.</text>
</svg>
