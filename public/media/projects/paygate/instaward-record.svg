<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title description">
  <title id="title">PayGate SCF Instaward record</title>
  <desc id="description">An original editorial citation plate recording that PayGate was awarded a 5,000 US dollar SCF Instaward. It identifies the Stellar Indonesia announcement and official SCF Instawards rules as the two attributable public sources and explicitly states that the award is funding, not a partnership, mainnet launch, or revenue claim.</desc>
  <defs><style>.canvas{fill:#f4f5f3}.surface{fill:#fff}.soft{fill:#e8ecff}.matte{fill:#111315}.ink{fill:#111315}.text{fill:#2b3035}.muted{fill:#596068}.light{fill:#f4f5f3}.accent{fill:#5b42dd}.rule{stroke:#c9ced3}.rule-strong{stroke:#20252a}.rule-accent{stroke:#5b42dd}.sans{font-family:Geist,Arial,sans-serif}.mono{font-family:"Geist Mono","SFMono-Regular",Consolas,monospace}.hairline{stroke-width:1;vector-effect:non-scaling-stroke}.strong{stroke-width:2;vector-effect:non-scaling-stroke}</style><pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#c9ced3" opacity=".35"/></pattern></defs>
  <rect class="canvas" width="1600" height="1000"/><rect x="48" y="48" width="1504" height="904" fill="url(#grid)"/><rect x="48" y="48" width="1504" height="904" fill="none" class="rule-strong hairline"/>
  <text x="88" y="103" class="mono accent" font-size="18" font-weight="600" letter-spacing="1.4">PAYGATE / EXTERNAL OUTCOME</text><text x="1512" y="103" text-anchor="end" class="mono muted" font-size="15">SCF INSTAWARD / 2026</text><line x1="88" y1="146" x2="1512" y2="146" class="rule-strong hairline"/>
  <rect x="88" y="198" width="908" height="480" class="matte rule-strong strong"/><text x="128" y="252" class="mono light" font-size="15" letter-spacing="1.2">AWARDED FUNDING</text><text x="128" y="395" class="sans light" font-size="128" font-weight="600" letter-spacing="-7">$5,000</text><text x="128" y="470" class="sans light" font-size="46" font-weight="600">SCF Instaward</text><text x="128" y="532" class="sans light" font-size="22">A funded execution signal for the active</text><text x="128" y="568" class="sans light" font-size="22">Stellar testnet product—not a finish line.</text><rect x="128" y="616" width="260" height="30" fill="#5b42dd"/><text x="258" y="637" text-anchor="middle" class="mono light" font-size="12">FOUNDER-LED BUILD</text>
  <rect x="1020" y="198" width="492" height="222" class="surface rule-accent strong"/><text x="1048" y="244" class="mono accent" font-size="14">PUBLIC SOURCE 01</text><text x="1048" y="294" class="sans ink" font-size="27" font-weight="600">Stellar Indonesia</text><text x="1048" y="335" class="sans text" font-size="18">Announcement congratulating</text><text x="1048" y="365" class="sans text" font-size="18">the PayGate team and founder.</text>
  <rect x="1020" y="456" width="492" height="222" class="surface rule-strong strong"/><text x="1048" y="502" class="mono accent" font-size="14">PUBLIC SOURCE 02</text><text x="1048" y="552" class="sans ink" font-size="27" font-weight="600">Official SCF rules</text><text x="1048" y="593" class="sans text" font-size="18">Program definition, award range,</text><text x="1048" y="623" class="sans text" font-size="18">and execution-funding context.</text>
  <rect x="88" y="718" width="1424" height="132" class="soft rule-accent strong"/><text x="116" y="760" class="mono accent" font-size="14">CLAIM BOUNDARY</text><text x="116" y="807" class="sans ink" font-size="24" font-weight="600">Funding selection—not a Stellar partnership, mainnet launch, revenue, or customer-scale claim.</text>
  <text x="88" y="913" class="sans muted" font-size="15">The case study links directly to both public sources beside the outcome statement.</text>
</svg>
