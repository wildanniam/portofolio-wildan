<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title description">
  <title id="title">PayGate Stellar testnet settlement ledger</title>
  <desc id="description">An editorial ledger showing a real PayGate testnet settlement sequence: USDC transfer to escrow, idempotent payment credit, developer withdrawal, and platform-fee withdrawal, each tied to a public Stellar transaction hash. It distinguishes the network transfer from PayGate's backend ledger credit and limits the evidence to testnet.</desc>
  <defs><style>.canvas{fill:#f4f5f3}.surface{fill:#fff}.soft{fill:#e8ecff}.green{fill:#e7f6ec}.matte{fill:#111315}.ink{fill:#111315}.text{fill:#2b3035}.muted{fill:#596068}.light{fill:#f4f5f3}.accent{fill:#5b42dd}.ok{fill:#157143}.rule{stroke:#c9ced3}.rule-strong{stroke:#20252a}.sans{font-family:Geist,Arial,sans-serif}.mono{font-family:"Geist Mono","SFMono-Regular",Consolas,monospace}.hairline{stroke-width:1;vector-effect:non-scaling-stroke}.strong{stroke-width:2;vector-effect:non-scaling-stroke}</style><pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#c9ced3" opacity=".35"/></pattern></defs>
  <rect class="canvas" width="1600" height="1000"/><rect x="48" y="48" width="1504" height="904" fill="url(#grid)"/><rect x="48" y="48" width="1504" height="904" fill="none" class="rule-strong hairline"/>
  <text x="88" y="103" class="mono accent" font-size="18" font-weight="600" letter-spacing="1.4">PAYGATE / TESTNET LEDGER</text><text x="88" y="178" class="sans ink" font-size="68" font-weight="600" letter-spacing="-3.2">Settlement leaves four public traces.</text><text x="88" y="221" class="sans text" font-size="22">Transfer, credit, developer withdrawal, and fee withdrawal remain separately inspectable.</text><text x="1512" y="103" text-anchor="end" class="mono muted" font-size="15">STELLAR TESTNET / JUL 2026</text><line x1="88" y1="260" x2="1512" y2="260" class="rule-strong hairline"/>
  <rect x="88" y="300" width="1424" height="450" class="surface rule-strong strong"/><text x="116" y="344" class="mono muted" font-size="13">STEP</text><text x="214" y="344" class="mono muted" font-size="13">ACTION</text><text x="782" y="344" class="mono muted" font-size="13">AMOUNT</text><text x="1050" y="344" class="mono muted" font-size="13">TRANSACTION</text><line x1="116" y1="370" x2="1484" y2="370" class="rule-strong hairline"/>
  <text x="116" y="426" class="mono accent" font-size="14">01</text><text x="214" y="426" class="sans ink" font-size="21" font-weight="600">Payer transfers USDC to escrow</text><text x="782" y="426" class="mono text" font-size="16">0.10 USDC</text><text x="1050" y="426" class="mono accent" font-size="14">b5d1022d…1c27ce8a</text><line x1="116" y1="459" x2="1484" y2="459" class="rule hairline"/>
  <text x="116" y="515" class="mono accent" font-size="14">02</text><text x="214" y="515" class="sans ink" font-size="21" font-weight="600">Admin credits payment p1a001</text><text x="782" y="515" class="mono text" font-size="16">0.09 + 0.01</text><text x="1050" y="515" class="mono accent" font-size="14">fad73bf6…101dfad</text><line x1="116" y1="548" x2="1484" y2="548" class="rule hairline"/>
  <text x="116" y="604" class="mono accent" font-size="14">03</text><text x="214" y="604" class="sans ink" font-size="21" font-weight="600">Developer withdraws credited balance</text><text x="782" y="604" class="mono text" font-size="16">0.09 USDC</text><text x="1050" y="604" class="mono accent" font-size="14">8f0647f5…679d50d7</text><line x1="116" y1="637" x2="1484" y2="637" class="rule hairline"/>
  <text x="116" y="693" class="mono accent" font-size="14">04</text><text x="214" y="693" class="sans ink" font-size="21" font-weight="600">Platform fee withdrawal</text><text x="782" y="693" class="mono text" font-size="16">0.01 USDC</text><text x="1050" y="693" class="mono accent" font-size="14">0bf30b3f…a26d04b</text>
  <rect x="88" y="782" width="826" height="104" class="soft"/><text x="116" y="822" class="mono accent" font-size="13">IDENTITY BINDING</text><text x="116" y="856" class="sans ink" font-size="20" font-weight="600">Payment ID → unique record → idempotent credit</text>
  <rect x="938" y="782" width="574" height="104" class="matte"/><text x="966" y="822" class="mono light" font-size="13">PROOF SCOPE</text><text x="966" y="856" class="sans light" font-size="18">Public testnet execution, not mainnet readiness.</text>
  <text x="88" y="929" class="sans muted" font-size="15">Source: canonical settlement evidence packet with public Stellar Expert transaction links.</text>
</svg>
