<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title description">
  <title id="title">PayGate machine-paid request lifecycle</title>
  <desc id="description">An editorial lifecycle diagram tracing an unpaid API request through an HTTP 402 challenge, Stellar MPP verification, persistent replay protection, Soroban escrow credit, a secret-protected upstream, and a receipt. It also shows retry behavior for paid but undelivered requests and developer-signed withdrawal.</desc>
  <defs>
    <style>
      .canvas{fill:#f4f5f3}.surface{fill:#fff}.soft{fill:#e8ecff}.green{fill:#e7f6ec}.matte{fill:#111315}.ink{fill:#111315}.text{fill:#2b3035}.muted{fill:#596068}.light{fill:#f4f5f3}.accent{fill:#5b42dd}.ok{fill:#157143}.rule{stroke:#c9ced3}.rule-strong{stroke:#20252a}.rule-accent{stroke:#5b42dd}.sans{font-family:Geist,Arial,sans-serif}.mono{font-family:"Geist Mono","SFMono-Regular",Consolas,monospace}.hairline{stroke-width:1;vector-effect:non-scaling-stroke}.strong{stroke-width:2;vector-effect:non-scaling-stroke}.arrow{fill:none;stroke:#5b42dd;stroke-width:2;vector-effect:non-scaling-stroke;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 8 4 0 8Z" fill="#5b42dd"/></marker>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#c9ced3" opacity=".35"/></pattern>
  </defs>
  <rect class="canvas" width="1600" height="1000"/><rect x="48" y="48" width="1504" height="904" fill="url(#grid)"/><rect x="48" y="48" width="1504" height="904" fill="none" class="rule-strong hairline"/>
  <text x="88" y="103" class="mono accent" font-size="18" font-weight="600" letter-spacing="1.4">PAYGATE / REQUEST LIFECYCLE</text>
  <text x="88" y="178" class="sans ink" font-size="68" font-weight="600" letter-spacing="-3.2">One payment. One observable request.</text>
  <text x="88" y="221" class="sans text" font-size="22">Payment identity stays bound across HTTP, storage, Stellar, Soroban, and delivery.</text>
  <text x="1512" y="103" text-anchor="end" class="mono muted" font-size="15">TESTNET V1 / JUL 2026</text>
  <line x1="88" y1="260" x2="1512" y2="260" class="rule-strong hairline"/>

  <text x="88" y="304" class="mono muted" font-size="14">REQUEST</text><text x="326" y="304" class="mono muted" font-size="14">CHALLENGE</text><text x="564" y="304" class="mono muted" font-size="14">VERIFY</text><text x="802" y="304" class="mono muted" font-size="14">CREDIT</text><text x="1040" y="304" class="mono muted" font-size="14">DELIVER</text><text x="1278" y="304" class="mono muted" font-size="14">PROVE</text>
  <rect x="88" y="328" width="200" height="260" class="surface rule-strong strong"/><text x="112" y="374" class="sans ink" font-size="25" font-weight="600">Agent call</text><text x="112" y="418" class="mono accent" font-size="13">GET / JSON</text><text x="112" y="458" class="sans text" font-size="17">Paid endpoint</text><text x="112" y="491" class="sans text" font-size="17">No credential yet</text><rect x="112" y="526" width="152" height="38" class="matte"/><text x="188" y="551" text-anchor="middle" class="mono light" font-size="12">REQUEST ID</text><path d="M288 458H310" class="arrow"/>
  <rect x="326" y="328" width="200" height="260" class="surface rule-strong strong"/><text x="350" y="374" class="sans ink" font-size="25" font-weight="600">HTTP 402</text><text x="350" y="418" class="mono accent" font-size="13">AMOUNT + RECIPIENT</text><text x="350" y="458" class="sans text" font-size="17">Payment identifier</text><text x="350" y="491" class="sans text" font-size="17">Machine terms</text><rect x="350" y="526" width="152" height="38" class="soft"/><text x="426" y="551" text-anchor="middle" class="mono accent" font-size="12">MPP CHALLENGE</text><path d="M526 458H548" class="arrow"/>
  <rect x="564" y="328" width="200" height="260" class="matte rule-strong strong"/><text x="588" y="374" class="sans light" font-size="25" font-weight="600">MPP verify</text><text x="588" y="418" class="mono light" font-size="13">STELLAR TESTNET</text><text x="588" y="458" class="sans light" font-size="17">Binding + amount</text><text x="588" y="491" class="sans light" font-size="17">Recipient + replay</text><rect x="588" y="526" width="152" height="38" fill="#5b42dd"/><text x="664" y="551" text-anchor="middle" class="mono light" font-size="12">TX UNIQUE</text><path d="M764 458H786" class="arrow"/>
  <rect x="802" y="328" width="200" height="260" class="surface rule-accent strong"/><text x="826" y="374" class="sans ink" font-size="25" font-weight="600">Escrow</text><text x="826" y="418" class="mono accent" font-size="13">SOROBAN CREDIT</text><text x="826" y="458" class="sans text" font-size="17">Idempotent payment</text><text x="826" y="491" class="sans text" font-size="17">90 / 10 ledger split</text><rect x="826" y="526" width="152" height="38" class="soft"/><text x="902" y="551" text-anchor="middle" class="mono accent" font-size="12">CREDITED</text><path d="M1002 458H1024" class="arrow"/>
  <rect x="1040" y="328" width="200" height="260" class="surface rule-strong strong"/><text x="1064" y="374" class="sans ink" font-size="25" font-weight="600">Upstream</text><text x="1064" y="418" class="mono accent" font-size="13">SECRET PROTECTED</text><text x="1064" y="458" class="sans text" font-size="17">Bounded forward</text><text x="1064" y="491" class="sans text" font-size="17">Timeout + size guard</text><rect x="1064" y="526" width="152" height="38" class="green"/><text x="1140" y="551" text-anchor="middle" class="mono ok" font-size="12">200 JSON</text><path d="M1240 458H1262" class="arrow"/>
  <rect x="1278" y="328" width="234" height="260" class="surface rule-strong strong"/><text x="1302" y="374" class="sans ink" font-size="25" font-weight="600">Receipt</text><text x="1302" y="418" class="mono accent" font-size="13">PAYMENT-RECEIPT</text><text x="1302" y="458" class="sans text" font-size="17">Request state</text><text x="1302" y="491" class="sans text" font-size="17">Payment + credit proof</text><rect x="1302" y="526" width="186" height="38" class="matte"/><text x="1395" y="551" text-anchor="middle" class="mono light" font-size="12">TRACEABLE RESULT</text>

  <rect x="88" y="628" width="930" height="178" class="soft rule-accent strong"/>
  <text x="116" y="671" class="mono accent" font-size="14" letter-spacing="1">FAILURE IS A STATE, NOT A SECOND CHARGE</text>
  <text x="116" y="716" class="sans ink" font-size="27" font-weight="600">Paid but not delivered remains retryable.</text>
  <text x="116" y="757" class="sans text" font-size="18">The credential can retry until forwarding succeeds; replay closes after the request reaches its delivered state.</text>
  <rect x="1042" y="628" width="470" height="178" class="matte rule-strong strong"/>
  <text x="1070" y="671" class="mono light" font-size="14" letter-spacing="1">PROVIDER CUSTODY</text>
  <text x="1070" y="716" class="sans light" font-size="25" font-weight="600">Freighter signs withdrawal.</text>
  <text x="1070" y="757" class="sans light" font-size="17">The server checks intent and expected hash.</text>
  <line x1="88" y1="852" x2="1512" y2="852" class="rule-strong hairline"/>
  <text x="88" y="893" class="sans muted" font-size="16">Activation also proves protection: an invalid upstream secret must fail before the valid secret can activate an endpoint.</text>
  <text x="1512" y="893" text-anchor="end" class="mono muted" font-size="13">HTTP 402 • MPP • SOROBAN • FREIGHTER</text>
</svg>
