<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title description">
  <title id="title">Nova AI source and sprint ledger</title>
  <desc id="description">An editorial repository ledger showing Nova as a substantial completed hackathon artifact: 82 commits, 187 tracked files, about 20,445 lines of TypeScript and TSX, 62 commits associated with Wildan, and representative authored surfaces across CopilotKit actions, generative transaction UI, prediction, Paylink, rate limiting, and deployment.</desc>
  <defs><style>.canvas{fill:#f4f5f3}.surface{fill:#fff}.soft{fill:#ece9ff}.matte{fill:#111315}.ink{fill:#111315}.text{fill:#2b3035}.muted{fill:#596068}.light{fill:#f4f5f3}.accent{fill:#5a42d6}.rule{stroke:#c9ced3}.rule-strong{stroke:#20252a}.rule-accent{stroke:#5a42d6}.sans{font-family:Geist,Arial,sans-serif}.mono{font-family:"Geist Mono","SFMono-Regular",Consolas,monospace}.hairline{stroke-width:1;vector-effect:non-scaling-stroke}.strong{stroke-width:2;vector-effect:non-scaling-stroke}</style><pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#c9ced3" opacity=".35"/></pattern></defs>
  <rect class="canvas" width="1600" height="1000"/><rect x="48" y="48" width="1504" height="904" fill="url(#grid)"/><rect x="48" y="48" width="1504" height="904" fill="none" class="rule-strong hairline"/>
  <text x="88" y="103" class="mono accent" font-size="18" font-weight="600" letter-spacing="1.4">NOVA AI / SOURCE LEDGER</text><text x="88" y="178" class="sans ink" font-size="68" font-weight="600" letter-spacing="-3.2">A sprint with a visible implementation trail.</text><text x="88" y="221" class="sans text" font-size="22">Repository scale and authored surfaces support the Full-Stack &amp; AI Builder role.</text><text x="1512" y="103" text-anchor="end" class="mono muted" font-size="15">PUBLIC REPOSITORY / JUL 2026</text><line x1="88" y1="260" x2="1512" y2="260" class="rule-strong hairline"/>
  <rect x="88" y="300" width="320" height="210" class="matte rule-strong strong"/><text x="116" y="344" class="mono light" font-size="14">REPOSITORY</text><text x="116" y="404" class="sans light" font-size="48" font-weight="600">82 commits</text><text x="116" y="449" class="sans light" font-size="19">187 tracked files</text><text x="116" y="480" class="sans light" font-size="19">136 TypeScript / TSX files</text>
  <rect x="432" y="300" width="392" height="210" class="soft rule-accent strong"/><text x="460" y="344" class="mono accent" font-size="14">WILDAN CONTRIBUTION</text><text x="460" y="404" class="sans ink" font-size="48" font-weight="600">62 / 82</text><text x="460" y="449" class="sans text" font-size="19">commits associated with his verified</text><text x="460" y="480" class="sans text" font-size="19">email or GitHub identity</text>
  <rect x="848" y="300" width="664" height="210" class="surface rule-strong strong"/><text x="876" y="344" class="mono accent" font-size="14">IMPLEMENTATION SCALE</text><text x="876" y="404" class="sans ink" font-size="48" font-weight="600">≈20,445 lines</text><text x="876" y="449" class="sans text" font-size="19">TypeScript / TSX across product, agent, APIs,</text><text x="876" y="480" class="sans text" font-size="19">generative UI, payments, data, and deployment</text>
  <rect x="88" y="542" width="1424" height="258" class="surface rule-strong strong"/><text x="116" y="586" class="mono accent" font-size="14">REPRESENTATIVE AUTHORED SURFACES</text><line x1="116" y1="610" x2="1484" y2="610" class="rule hairline"/>
  <text x="116" y="656" class="sans ink" font-size="21" font-weight="600">Agent runtime</text><text x="360" y="656" class="sans text" font-size="19">CopilotKit route, action registry, GPT tool behavior</text>
  <text x="116" y="700" class="sans ink" font-size="21" font-weight="600">Generative UI</text><text x="360" y="700" class="sans text" font-size="19">Transaction, on-chain search, and prediction cards</text>
  <text x="116" y="744" class="sans ink" font-size="21" font-weight="600">Full-stack paths</text><text x="360" y="744" class="sans text" font-size="19">Paylink, Prisma, Redis rate limits, Vercel fixes, documentation</text>
  <rect x="1120" y="642" width="336" height="104" class="soft"/><text x="1148" y="678" class="mono accent" font-size="13">COMPANION SERVICE</text><text x="1148" y="716" class="sans ink" font-size="19" font-weight="600">Prediction endpoint reachable</text>
  <rect x="88" y="828" width="1424" height="54" class="matte"/><text x="116" y="862" class="sans light" font-size="17">Completed hackathon sprint artifact • public source • recorded and live states stay explicitly labeled</text>
  <text x="88" y="925" class="sans muted" font-size="15">Contribution counts establish implementation ownership while collaborator credit remains visible in the case study.</text>
</svg>
