<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title description">
  <title id="title">Nova AI agent and wallet-signing boundary</title>
  <desc id="description">An editorial system diagram showing a user prompt entering Nova's CopilotKit action layer, moving through Next.js routes to chain clients or a prediction service, returning as a purpose-built evidence card, and requiring a separate connected-wallet action before any prepared transaction can be signed.</desc>
  <defs>
    <style>
      .canvas{fill:#f4f5f3}.surface{fill:#fff}.soft{fill:#ece9ff}.matte{fill:#111315}.ink{fill:#111315}.text{fill:#2b3035}.muted{fill:#596068}.light{fill:#f4f5f3}.accent{fill:#5a42d6}.rule{stroke:#c9ced3}.rule-strong{stroke:#20252a}.rule-accent{stroke:#5a42d6}.sans{font-family:Geist,Arial,sans-serif}.mono{font-family:"Geist Mono","SFMono-Regular",Consolas,monospace}.hairline{stroke-width:1;vector-effect:non-scaling-stroke}.strong{stroke-width:2;vector-effect:non-scaling-stroke}.arrow{fill:none;stroke:#5a42d6;stroke-width:2;vector-effect:non-scaling-stroke;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 8 4 0 8Z" fill="#5a42d6"/></marker>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#c9ced3" opacity=".35"/></pattern>
  </defs>
  <rect class="canvas" width="1600" height="1000"/>
  <rect x="48" y="48" width="1504" height="904" fill="url(#grid)"/>
  <rect x="48" y="48" width="1504" height="904" fill="none" class="rule-strong hairline"/>
  <text x="88" y="103" class="mono accent" font-size="18" font-weight="600" letter-spacing="1.4">NOVA AI / AGENT BOUNDARY</text>
  <text x="88" y="178" class="sans ink" font-size="68" font-weight="600" letter-spacing="-3.2">Intent becomes an inspectable plan.</text>
  <text x="88" y="221" class="sans text" font-size="22">The agent can interpret, retrieve, and prepare. The connected wallet keeps the signature.</text>
  <text x="1512" y="103" text-anchor="end" class="mono muted" font-size="15">SOURCE-DERIVED / JUL 2026</text>
  <line x1="88" y1="260" x2="1512" y2="260" class="rule-strong hairline"/>

  <text x="88" y="306" class="mono muted" font-size="14" letter-spacing="1">01 / INTENT</text>
  <text x="386" y="306" class="mono muted" font-size="14" letter-spacing="1">02 / ORCHESTRATE</text>
  <text x="684" y="306" class="mono muted" font-size="14" letter-spacing="1">03 / RETRIEVE</text>
  <text x="982" y="306" class="mono muted" font-size="14" letter-spacing="1">04 / REVIEW</text>
  <text x="1280" y="306" class="mono muted" font-size="14" letter-spacing="1">05 / AUTHORIZE</text>

  <rect x="88" y="332" width="246" height="326" class="surface rule-strong strong"/>
  <text x="112" y="379" class="sans ink" font-size="27" font-weight="600">User prompt</text>
  <line x1="112" y1="404" x2="310" y2="404" class="rule hairline"/>
  <text x="112" y="451" class="sans text" font-size="18">“Analyze this address.”</text>
  <text x="112" y="489" class="sans text" font-size="18">“Prepare a send.”</text>
  <text x="112" y="527" class="sans text" font-size="18">“Estimate trade cost.”</text>
  <rect x="112" y="568" width="198" height="62" class="soft"/>
  <text x="128" y="594" class="mono accent" font-size="12">NATURAL LANGUAGE</text>
  <text x="128" y="616" class="sans ink" font-size="17">One stated intention</text>
  <path d="M334 493H370" class="arrow"/>

  <rect x="386" y="332" width="246" height="326" class="matte rule-strong strong"/>
  <text x="410" y="379" class="sans light" font-size="27" font-weight="600">CopilotKit</text>
  <line x1="410" y1="404" x2="608" y2="404" stroke="#555c63" class="hairline"/>
  <text x="410" y="451" class="mono light" font-size="14">ACTION REGISTRY</text>
  <text x="410" y="488" class="sans light" font-size="18">Choose a bounded tool</text>
  <text x="410" y="523" class="sans light" font-size="18">Validate required input</text>
  <text x="410" y="558" class="sans light" font-size="18">Keep UI state explicit</text>
  <rect x="410" y="591" width="198" height="39" fill="#5a42d6"/>
  <text x="509" y="616" text-anchor="middle" class="mono light" font-size="12">NO PRIVATE KEY</text>
  <path d="M632 493H668" class="arrow"/>

  <rect x="684" y="332" width="246" height="326" class="surface rule-strong strong"/>
  <text x="708" y="379" class="sans ink" font-size="27" font-weight="600">Next.js routes</text>
  <line x1="708" y1="404" x2="906" y2="404" class="rule hairline"/>
  <text x="708" y="451" class="mono accent" font-size="14">CHAIN CLIENTS</text>
  <text x="708" y="483" class="sans text" font-size="17">RPC + explorer reads</text>
  <text x="708" y="528" class="mono accent" font-size="14">PREDICTOR</text>
  <text x="708" y="560" class="sans text" font-size="17">Separate model service</text>
  <text x="708" y="605" class="mono accent" font-size="14">TRANSACTION</text>
  <text x="708" y="629" class="sans text" font-size="17">Prepared, not signed</text>
  <path d="M930 493H966" class="arrow"/>

  <rect x="982" y="332" width="246" height="326" class="surface rule-accent strong"/>
  <text x="1006" y="379" class="sans ink" font-size="27" font-weight="600">Evidence UI</text>
  <line x1="1006" y1="404" x2="1204" y2="404" class="rule hairline"/>
  <text x="1006" y="451" class="sans text" font-size="18">Balance or analysis card</text>
  <text x="1006" y="489" class="sans text" font-size="18">Model estimate + label</text>
  <text x="1006" y="527" class="sans text" font-size="18">Transaction review state</text>
  <rect x="1006" y="568" width="198" height="62" class="soft"/>
  <text x="1022" y="594" class="mono accent" font-size="12">INSPECT BEFORE ACTION</text>
  <text x="1022" y="616" class="sans ink" font-size="17">Confirm or cancel</text>
  <path d="M1228 493H1264" class="arrow"/>

  <rect x="1280" y="332" width="232" height="326" class="matte rule-strong strong"/>
  <text x="1304" y="379" class="sans light" font-size="27" font-weight="600">Wallet</text>
  <line x1="1304" y1="404" x2="1488" y2="404" stroke="#555c63" class="hairline"/>
  <text x="1304" y="451" class="mono light" font-size="14">NETWORK CHECK</text>
  <text x="1304" y="488" class="mono light" font-size="14">DETAILS REVIEW</text>
  <text x="1304" y="525" class="mono light" font-size="14">USER SIGNATURE</text>
  <rect x="1304" y="568" width="184" height="62" fill="#5a42d6"/>
  <text x="1396" y="594" text-anchor="middle" class="mono light" font-size="12">FINAL BOUNDARY</text>
  <text x="1396" y="616" text-anchor="middle" class="sans light" font-size="17">User authorizes</text>

  <rect x="88" y="700" width="1424" height="129" class="soft"/>
  <text x="112" y="741" class="mono accent" font-size="14" letter-spacing="1">TWO OUTPUT PATHS</text>
  <text x="112" y="784" class="sans ink" font-size="24" font-weight="600">Read: evidence returns to the interface.</text>
  <text x="792" y="784" class="sans ink" font-size="24" font-weight="600">Write: a proposal waits for wallet approval.</text>
  <line x1="760" y1="728" x2="760" y2="805" class="rule-accent hairline"/>
  <line x1="88" y1="874" x2="1512" y2="874" class="rule-strong hairline"/>
  <text x="88" y="914" class="sans muted" font-size="16">Completed hackathon architecture reconstructed from the active repository paths; recorded and live states remain labeled separately.</text>
  <text x="1512" y="914" text-anchor="end" class="mono muted" font-size="13">COPILOTKIT • NEXT.JS • WAGMI • VIEM</text>
</svg>
